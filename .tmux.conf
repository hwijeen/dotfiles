##### Basic configuration #####
# Use C-a as a prefix
unbind-key C-b
set -g prefix C-a

# Use terminal that support 256 colors
set -g default-terminal xterm-256color

# <prefix> + r to reload tmux configuration
bind r source-file ~/.tmux.conf



##### Key bindings #####
# Select panes with vim-likke keybindings
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Move panes to left, right, up, and down
bind H swap-pane -s :.-1
bind L swap-pane -s :.+1
bind K swap-pane -U
bind J swap-pane -D

bind > resize-pane -R 5
bind < resize-pane -L 5
bind + resize-pane -D 5
bind - resize-pane -U 5

# <prefix> + Left to move to the left window
# for mac
bind Left swap-window -t -1 \; previous-window
bind Right swap-window -t +1 \; next-window
# for ubuntu
# bind Left swap-window -t -1; previous-window
# bind Right swap-window -t +1; next-window

# Open window in same path
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Disable zoom as it interferes with ctrl + z (I think)
unbind z

##### Options #####
# Set vim-like key binding in copy mode
setw -g mode-keys vi
# Mouse-drag selects only; press y to copy explicitly (no auto-copy on release)
unbind -T copy-mode-vi MouseDragEnd1Pane
# After copy we deselect the text but stays in the same scroll position instead of jumpiny to the bottom
bind -T copy-mode-vi y send-keys -X copy-selection\; send-keys -X clear-selection
# TODO: figure out why ESC for clear-selection doesn't work
# tmux list-keys -T copy-mode-vi | grep clear-selection

set -g mouse on
set -g allow-rename off
set -g automatic-rename off
set -g renumber-windows on
set-option -g history-limit 50000

# Use zsh for all new shells/windows/panes.
if-shell 'test -x /usr/bin/zsh' \
  'set -g default-shell /usr/bin/zsh' \
  'set -g default-shell /bin/zsh'
set -gu default-command

# Status line configuration
# set -g set-titles on
# set -g set-titles-string "#P"
# set -g status-bg black
# set -g status-fg green
# Status bar styling is owned by the vim-tmuxline snapshot (generated with
#   vim -N -u ~/.vimrc -es -c 'TmuxlineSnapshot! ~/dotfiles/tmuxline.conf' -c 'qa!'
# Re-run that after changing g:tmuxline_preset in ~/.vimrc. Sourcing it here means
# reloads reproduce the vim look without needing to open vim.
# Fallback plain values (used only if the snapshot is missing):
set -g status-left-length 85
set -g status-left "(#S)" # (session name) window_index/num_windows
set -g status-right "%H:%M %d-%b-%Y"
set -g status-justify left
if-shell "test -f ~/dotfiles/tmuxline.conf" "source ~/dotfiles/tmuxline.conf"
# set -g base-index 0 # start window index at 1
# set -g pane-base-index 0  # start pane index at 1
# set -g status-interval 5  # Update every 5 seconds

# Needed for OSC52 clipboard integration (https://github.com/ojroques/vim-oscyank?tab=readme-ov-file#installation)
set -s set-clipboard on

##### Bell / activity #####
# When a background window rings the bell, color its whole status entry Nord
# yellow until it's viewed. (Copilot CLI beeps when it finishes a turn and awaits
# input; enable with `beep: true`.)
set -g monitor-bell on
set -g bell-action other
set -g window-status-bell-style 'fg=colour3,bg=colour8'

# Manually pin/mark windows: prefix + m toggles an underline on the current window name.
# The underline is rendered via the tmuxline preset (#{?@pin,...}) so it stays on-theme.
bind m set -wF @pin '#{?@pin,,1}' \; display-message 'window pin #{?@pin,on,off}'

##### Plugins #####
set -g @plugin 'tmux-plugins/tpm'

# Initialize TPM (keep this line at the very bottom of tmux.conf)
run -b '~/.tmux/plugins/tpm/tpm'
